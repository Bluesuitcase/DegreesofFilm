<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Degrees of Film</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="wordmark">Degrees of Film</div>
      <a class="navlink" id="archive-link" href="?archive">Archive</a>
    </div>
    <div class="stats">
      <span class="stat"><b id="depth">0</b><span>depth</span></span>
      <span class="stat"><b id="score">0</b><span>score</span></span>
    </div>
  </header>

  <main class="stage">
    <aside class="rail" id="rail" aria-hidden="true"></aside>

    <section class="play" id="play">
      <figure class="frame">
        <img id="frame-img" alt="A frame from the film, with the title hidden" />
      </figure>
      <div class="rung">
        <p class="eyebrow" id="role">&nbsp;</p>
        <h1 class="prompt" id="prompt">Loading…</h1>
      </div>
      <div class="controls">
        <div class="guessrow">
          <input id="guess" type="text" autocomplete="off" autocapitalize="off"
                 spellcheck="false" placeholder="Name it…" />
          <button id="guess-btn">Guess</button>
        </div>
        <div id="choices" class="choices"></div>
        <div class="meta">
          <div class="attempts" id="attempts" aria-label="Attempts remaining"></div>
          <div class="lifelines">
            <button id="help-btn" class="skip">I Need Help</button>
            <button id="skip-btn" class="skip">Skip</button>
          </div>
        </div>
        <p class="feedback" id="feedback" role="status">&nbsp;</p>
      </div>
    </section>

    <section class="end hidden" id="end"></section>

    <section class="archive hidden" id="archive">
      <h2 class="arc-title">Past puzzles</h2>
      <p class="arc-sub">Replay a previous daily. (Titles hidden so the film rung stays a challenge.)</p>
      <div id="archive-list" class="archive-list"></div>
    </section>
  </main>

  <!-- Mandatory TMDB attribution. The inline SVG is a faithful gradient-pill
       rendition of the TMDB mark; swap in the official logo from
       themoviedb.org/about/logos for strict brand compliance. -->
  <footer class="attribution">
    <a class="tmdb" href="https://www.themoviedb.org/" target="_blank" rel="noopener"
       aria-label="The Movie Database (TMDB)">
      <svg viewBox="0 0 190 34" width="76" height="13.6" role="img" aria-hidden="true">
        <defs>
          <linearGradient id="tmdbg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#90cea1" />
            <stop offset=".5" stop-color="#3cbec9" />
            <stop offset="1" stop-color="#00b3e5" />
          </linearGradient>
        </defs>
        <rect width="190" height="34" rx="6" fill="url(#tmdbg)" />
        <text x="95" y="24" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
              font-weight="700" font-size="20" letter-spacing="1" fill="#0d253f">TMDB</text>
      </svg>
    </a>
    <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
